services:
  sstv-iptv:
    image: ghcr.io/sprkfade/sstv-iptv:latest
    container_name: sstv-iptv
    ports:
      - "3025:3025"
    environment:
      NODE_ENV: production
      PORT: 3025
      DATABASE_PATH: /app/data/sstv-iptv.sqlite
      CACHE_DIR: /app/cache
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-a-long-random-secret}
      FFMPEG_PATH: ffmpeg
      FFMPEG_USER_AGENT: ${FFMPEG_USER_AGENT:-VLC/3.0.20 LibVLC/3.0.20}
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
    restart: unless-stopped
