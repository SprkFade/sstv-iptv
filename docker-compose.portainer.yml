services:
  sstv-iptv:
    image: ghcr.io/sprkfade/sstv-iptv:latest
    container_name: sstv-iptv
    ports:
      - "3025:3025"
    environment:
      NODE_ENV: production
      PORT: 3025
      DATABASE_PATH: /app/data/sstv-iptv.sqlite
      CACHE_DIR: /app/cache
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-a-long-random-secret}
      M3U_URL: ${M3U_URL:-}
      XMLTV_URL: ${XMLTV_URL:-}
      REFRESH_INTERVAL_HOURS: ${REFRESH_INTERVAL_HOURS:-12}
      PLEX_SERVER_IDENTIFIER: ${PLEX_SERVER_IDENTIFIER:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      PLEX_PRODUCT_NAME: ${PLEX_PRODUCT_NAME:-SSTV IPTV}
      PLEX_CLIENT_IDENTIFIER: ${PLEX_CLIENT_IDENTIFIER:-}
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
    restart: unless-stopped
